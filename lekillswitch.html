<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>License Error</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background: radial-gradient(circle at center, rgba(255, 255, 255, .03) 0%, rgba(255, 255, 255, 0) 60%), #000;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", "Fira Code", Consolas, monospace;
            overflow: hidden;
        }

        #gifOverlay {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 9999;
            transition: opacity .5s ease;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
            opacity: 0;
        }

        .status {
            color: rgba(255, 255, 255, .35);
            font-size: 12px;
            letter-spacing: 5px;
            margin-bottom: 24px;
        }

        .title {
            color: white;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 400;
            margin-bottom: 14px;
        }

        .reason {
            color: rgba(255, 255, 255, .6);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .list {
            color: rgba(255, 255, 255, .9);
            font-size: 15px;
            line-height: 2;
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, .4);
            font-size: 13px;
        }

            .footer a {
                color: rgba(255, 255, 255, .4);
                text-decoration: underline;
                text-underline-offset: 3px;
                transition: color .2s ease;
            }

                .footer a:hover {
                    color: rgba(255, 255, 255, .7);
                }

        .separator {
            width: 120px;
            height: 1px;
            background: rgba(255, 255, 255, .15);
            margin: 32px auto;
        }
    </style>
</head>
<body>

    <img id="gifOverlay" src="https://media.tenor.com/PBElWq8QwuEAAAAM/hi-smiley.gif" alt="">

    <div class="container" id="content">

        <div class="status">oops!</div>

        <div class="title">
            Issue starting application
        </div>

        <div class="reason">
            Reasons could be:
        </div>

        <div class="separator"></div>

        <div class="list">
            <div>• Outdated Version</div>
            <div>• Cracked version</div>
        </div>

        <div class="separator"></div>

        <div class="footer">
            <a href="https://discord.gg/VJMwEHU69S" target="_blank" rel="noopener noreferrer">
                Contact support if this problem persists.
            </a>
        </div>

    </div>

    <script>
        setTimeout(() => {
            const gif = document.getElementById("gifOverlay");

            gif.style.opacity = "0";

            setTimeout(() => {
                gif.remove();

                const content = document.getElementById("content");

                content.animate(
                    [
                        { opacity: 0, transform: "translateY(10px)" },
                        { opacity: 1, transform: "translateY(0px)" }
                    ], {
                    duration: 600,
                    easing: "ease-out",
                    fill: "forwards"
                }
                );
            }, 500);
        }, 1000);
    </script>

</body>
</html>
